<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabungan Target</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --accent-primary: #6366f1;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #a855f7);
            --success: #059669;
            --danger: #e11d48;
            --warning: #d97706;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* --- Animasi Background Fluid Gradient 4-Arah (Anti-Monoton) --- */
        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        body {
            /* Perpaduan warna pastel-neon fresh yang bergerak dinamis */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb, #e0c3fc, #ffecd2, #96e6a1);
            background-size: 400% 400%;
            animation: fluidGradient 14s ease-in-out infinite;
            
            min-height: 100vh;
            color: var(--text-main);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        .dashboard-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- Efek Frosted White Glassmorphism --- */
        .card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.03),
                0 1px 3px rgba(0, 0, 0, 0.01),
                inset 0 0 30px rgba(255, 255, 255, 0.5);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            width: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 20px 40px rgba(99, 102, 241, 0.12),
                inset 0 0 20px rgba(255, 255, 255, 0.7);
        }

        .top-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .chart-box {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .circle-chart {
            position: relative;
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.25));
        }

        .circle-chart svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .circle-bg {
            fill: none;
            stroke: rgba(0, 0, 0, 0.05);
            stroke-width: 8;
        }

        .circle-progress {
            fill: none;
            stroke: url(#gradient-accent);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 282.74; 
            stroke-dashoffset: 282.74;
            transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chart-percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            font-weight: 700;
            color: #4f46e5;
        }

        .stats-details { 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            flex: 1;
            min-width: 0;
        }
        
        .stats-label { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .stats-value {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(to right, #1e1b4b, #4f46e5);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            word-wrap: break-word;
            line-height: 1.2;
        }
        
        .stats-subtext { font-size: 0.8rem; font-weight: 600; }

        .target-config-box { display: flex; flex-direction: column; justify-content: center; }

        .form-group { display: flex; flex-direction: column; margin-bottom: 16px; width: 100%; }
        .form-group label {
            font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;
        }

        input, select {
            width: 100%; 
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px; 
            font-size: 0.95rem; 
            color: var(--text-main);
            outline: none; 
            transition: all 0.3s ease;
            appearance: none;
        }

        select option { background: #ffffff; color: #1e293b; }

        input:focus, select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
            background: rgba(255, 255, 255, 0.9);
        }

        .form-row { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 16px; 
            width: 100%; 
        }

        button {
            width: 100%;
            padding: 12px 16px; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center;
        }

        .btn-primary { 
            background: var(--accent-gradient); 
            color: white; 
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
        }
        .btn-primary:hover { 
            opacity: 0.95; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-export {
            width: auto;
            background: rgba(5, 150, 105, 0.1); color: var(--success);
            border: 1px solid rgba(5, 150, 105, 0.2); padding: 8px 14px; font-size: 0.8rem; border-radius: 8px;
        }
        .btn-export:hover { background: var(--success); color: white; }

        .btn-action {
            width: auto;
            padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; margin-right: 4px; color: white; margin-bottom: 4px;
        }
        .btn-edit { background: rgba(217, 119, 6, 0.1); color: var(--warning); border: 1px solid rgba(217, 119, 6, 0.2); }
        .btn-edit:hover { background: var(--warning); color: white; }
        .btn-delete { background: rgba(225, 29, 72, 0.1); color: var(--danger); border: 1px solid rgba(225, 29, 72, 0.2); }
        .btn-delete:hover { background: var(--danger); color: white; }
        .btn-cancel { background: rgba(0, 0, 0, 0.05); color: var(--text-muted); border: 1px solid rgba(0, 0, 0, 0.05);}
        .btn-cancel:hover { background: rgba(0, 0, 0, 0.1); }

        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;}
        .history-header h2 { font-size: 1.1rem; }
        
        .table-container { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(0, 0, 0, 0.06); font-size: 0.85rem;}
        th { font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; white-space: nowrap;}
        
        .text-masuk { color: var(--success); font-weight: 600; }
        .text-keluar { color: var(--danger); font-weight: 600; }

        /* Modal Overlay System */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.2); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-card {
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px; padding: 24px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), inset 0 0 15px rgba(255, 255, 255, 0.5);
            transform: translateY(20px); animation: slideUp 0.3s forwards;
            max-height: 90vh; overflow-y: auto;
            color: var(--text-main);
        }
        .modal-card h3 { margin-bottom: 16px; font-size: 1.1rem; color: #4f46e5;}

        footer { text-align: center; margin-top: 10px; font-size: 0.8rem; color: var(--text-muted); padding-bottom: 20px; }

        @media (min-width: 768px) {
            body { padding: 40px; }
            .dashboard-container { gap: 24px; }
            .card { padding: 28px; }
            .top-grid { grid-template-columns: 1.2fr 1fr; gap: 24px; }
            .form-row { grid-template-columns: 1fr 1fr 1fr; }
            .circle-chart { width: 110px; height: 110px; }
            .chart-percentage { font-size: 1.25rem; }
            .stats-value { font-size: 1.6rem; }
            .stats-label { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="top-grid">
            <div class="card chart-box">
                <div class="circle-chart">
                    <svg viewBox="0 0 110 110">
                        <defs>
                            <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                        <circle class="circle-bg" cx="55" cy="55" r="45" />
                        <circle class="circle-progress" id="progressRing" cx="55" cy="55" r="45" />
                    </svg>
                    <div class="chart-percentage" id="txtPersentase">0%</div>
                </div>
                <div class="stats-details">
                    <div class="stats-label">Sisa Saldo Tersedia</div>
                    <div class="stats-value" id="totalSaldo">Rp 0</div>
                    <div class="stats-subtext" id="txtSisaKekurangan">Set target Anda</div>
                </div>
            </div>

            <div class="card target-config-box">
                <div class="form-group">
                    <label>Target Tabungan</label>
                    <input type="text" id="targetTabungan" placeholder="Contoh: Rp 5.000.000">
                </div>
            </div>
        </div>

        <div class="card">
            <form id="formTabungan">
                <div class="form-row" style="margin-bottom: 16px;">
                    <div class="form-group">
                        <label>Jenis Transaksi</label>
                        <select id="jenisTransaksi">
                            <option value="masuk">Menabung (Masuk)</option>
                            <option value="keluar">Uang Diambil (Keluar)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tanggal</label>
                        <input type="date" id="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label>Nominal (Rp)</label>
                        <input type="text" id="nominal" placeholder="Masukkan Nominal" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                            <label>Pilih Rekening Dana</label>
                            <button type="button" id="btnHapusRekSaved" style="display:none; width:auto; padding:2px 8px; font-size:0.7rem; background:rgba(225,29,72,0.1); color:var(--danger); border:1px solid rgba(225,29,72,0.2); border-radius:6px; margin-bottom:6px;">Hapus</button>
                        </div>
                        <select id="rekeningSelect" required>
                            <option value="" disabled selected>-- Pilih Rekening Dana --</option>
                            <option value="tambah_baru">+ Tambah Rekening Baru</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Catatan</label>
                        <input type="text" id="catatan" placeholder="Contoh: Sisa jajan mingguan / beli gadget">
                    </div>
                </div>

                <button type="submit" id="btnSubmitForm" class="btn-primary" style="margin-top: 16px;">
                    Simpan Transaksi
                </button>
            </form>
        </div>

        <div class="card">
            <div class="history-header">
                <h2>Riwayat Arus Kas</h2>
                <button class="btn-export" onclick="exportToExcel()">Export Excel</button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Bank/Wallet</th>
                            <th>No. Rekening</th>
                            <th>Atas Nama</th>
                            <th>Jenis</th>
                            <th>Nominal</th>
                            <th>Catatan</th>
                            <th style="text-align: center; width: 130px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="badanTabel"></tbody>
                </table>
            </div>
        </div>

        <footer>
            2026 Copyright By Adrian Maulana
        </footer>

    </div>

    <div class="modal-overlay" id="addAccountModal">
        <div class="modal-card">
            <h3>Tambah Rekening Baru</h3>
            <form id="formAddAccount">
                <div class="form-group">
                    <label>Nama Bank / E-Wallet di Indonesia</label>
                    <select id="addBank" required>
                        <option value="" disabled selected>-- Pilih Bank/Wallet --</option>
                        <optgroup label="Bank Umum / BUMN">
                            <option value="BCA">BCA (Bank Central Asia)</option>
                            <option value="Mandiri">Bank Mandiri</option>
                            <option value="BRI">BRI (Bank Rakyat Indonesia)</option>
                            <option value="BNI">BNI (Bank Negara Indonesia)</option>
                            <option value="BTN">BTN (Bank Tabungan Negara)</option>
                            <option value="BSI">BSI (Bank Syariah Indonesia)</option>
                        </optgroup>
                        <optgroup label="Bank Digital">
                            <option value="Bank Jago">Bank Jago</option>
                            <option value="SeaBank">SeaBank</option>
                            <option value="Allo Bank">Allo Bank</option>
                            <option value="Blu by BCA">Blu by BCA Digital</option>
                            <option value="Neo Commerce">Bank Neo Commerce (BNC)</option>
                            <option value="Line Bank">Line Bank by Hana Bank</option>
                        </optgroup>
                        <optgroup label="Bank Swasta & Daerah">
                            <option value="CIMB Niaga">CIMB Niaga</option>
                            <option value="Danamon">Bank Danamon</option>
                            <option value="Permata">Bank Permata</option>
                            <option value="OCBC NISP">OCBC NISP</option>
                            <option value="Maybank">Maybank Indonesia</option>
                            <option value="Panin">Bank Panin</option>
                            <option value="Bank Mega">Bank Mega</option>
                            <option value="Bukopin">KB Bank (Bukopin)</option>
                            <option value="Bank Muamalat">Bank Muamalat</option>
                            <option value="Bank bjb">Bank bjb</option>
                            <option value="Bank DKI">Bank DKI</option>
                            <option value="Bank Jateng">Bank Jateng</option>
                            <option value="Bank Jatim">Bank Jatim</option>
                            <option value="Bank Lainnya">Bank Daerah / Swasta Lainnya</option>
                        </optgroup>
                        <optgroup label="E-Wallet / Fintech">
                            <option value="DANA">DANA</option>
                            <option value="OVO">OVO</option>
                            <option value="GoPay">GoPay</option>
                            <option value="LinkAja">LinkAja</option>
                            <option value="ShopeePay">ShopeePay</option>
                        </optgroup>
                        <optgroup label="Lainnya">
                            <option value="Cash / Tunai">Cash / Tunai / Celengan</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nomor Rekening / Nomor HP</label>
                    <input type="text" id="addNoRek" placeholder="Contoh: 1234567890 / 0812xxx" required>
                </div>
                <div class="form-group">
                    <label>Nama Pemilik Rekening</label>
                    <input type="text" id="addNamaPemilik" placeholder="Masukkan Nama Lengkap Pemilik" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 24px;">
                    <button type="button" class="btn-cancel" style="flex: 1;" onclick="closeAddAccountModal()">Batal</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-card">
            <h3>Edit Transaksi</h3>
            <form id="formEdit">
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <select id="editJenis">
                        <option value="masuk">Menabung (Masuk)</option>
                        <option value="keluar">Uang Diambil (Keluar)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="editTanggal" required>
                </div>
                <div class="form-group">
                    <label>Nominal (Rp)</label>
                    <input type="text" id="editNominal" required>
                </div>
                <div class="form-group">
                    <label>Bank / Wallet</label>
                    <input type="text" id="editBank" required>
                </div>
                <div class="form-group">
                    <label>No. Rekening</label>
                    <input type="text" id="editNoRekField" required>
                </div>
                <div class="form-group">
                    <label>Nama Pemilik</label>
                    <input type="text" id="editNamaPemilikField" required>
                </div>
                <div class="form-group">
                    <label>Catatan</label>
                    <input type="text" id="editCatatan">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 24px;">
                    <button type="button" class="btn-cancel" style="flex: 1;" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let dataTabungan = JSON.parse(localStorage.getItem('tabungan_data_v8')) || [];
        let savedAccounts = JSON.parse(localStorage.getItem('rekening_saved_v8')) || [];
        let targetSaatIni = parseInt(localStorage.getItem('target_nominal_v8')) || 5000000;
        let modeEditId = null;

        const inputNominal = document.getElementById('nominal');
        const inputTarget = document.getElementById('targetTabungan');
        const inputTanggal = document.getElementById('tanggal');
        const inputJenis = document.getElementById('jenisTransaksi');
        const inputCatatan = document.getElementById('catatan');
        const rekeningSelect = document.getElementById('rekeningSelect');
        const btnHapusRekSaved = document.getElementById('btnHapusRekSaved');
        const progressRing = document.getElementById('progressRing');
        
        const ringCircumference = 282.74; 
        inputTanggal.valueAsDate = new Date();

        // --- MANAJEMEN DROP-DOWN REKENING SAVED ---
        const renderSavedAccountsDropdown = () => {
            rekeningSelect.innerHTML = `
                <option value="" disabled selected>-- Pilih Rekening Dana --</option>
                <option value="tambah_baru">+ Tambah Rekening Baru</option>
            `;
            savedAccounts.forEach(acc => {
                const opt = document.createElement('option');
                opt.value = acc.id;
                opt.innerText = `${acc.bank} - ${acc.noRek} (${acc.nama})`;
                rekeningSelect.appendChild(opt);
            });
        };

        rekeningSelect.addEventListener('change', function() {
            if (this.value === 'tambah_baru') {
                openAddAccountModal();
                this.value = ""; 
                btnHapusRekSaved.style.display = 'none';
            } else if(this.value !== "") {
                btnHapusRekSaved.style.display = 'inline-block';
            } else {
                btnHapusRekSaved.style.display = 'none';
            }
        });

        btnHapusRekSaved.addEventListener('click', function() {
            const currentId = rekeningSelect.value;
            if(currentId && currentId !== 'tambah_baru' && confirm('Hapus rekening ini dari memori simpan otomatis?')) {
                savedAccounts = savedAccounts.filter(acc => acc.id.toString() !== currentId.toString());
                localStorage.setItem('rekening_saved_v8', JSON.stringify(savedAccounts));
                renderSavedAccountsDropdown();
                btnHapusRekSaved.style.display = 'none';
            }
        });

        // --- POPUP REKENING ---
        const modalAddAccount = document.getElementById('addAccountModal');
        const openAddAccountModal = () => modalAddAccount.classList.add('active');
        const closeAddAccountModal = () => {
            modalAddAccount.classList.remove('active');
            document.getElementById('formAddAccount').reset();
        };

        document.getElementById('formAddAccount').addEventListener('submit', function(e) {
            e.preventDefault();
            const bankVal = document.getElementById('addBank').value;
            const noRekVal = document.getElementById('addNoRek').value.trim();
            const namaVal = document.getElementById('addNamaPemilik').value.trim();

            if(!bankVal || !noRekVal || !namaVal) return;

            const newAcc = { id: Date.now(), bank: bankVal, noRek: noRekVal, nama: namaVal };
            savedAccounts.push(newAcc);
            localStorage.setItem('rekening_saved_v8', JSON.stringify(savedAccounts));
            
            renderSavedAccountsDropdown();
            rekeningSelect.value = newAcc.id;
            btnHapusRekSaved.style.display = 'inline-block';
            
            closeAddAccountModal();
        });

        // --- CORE FORMATTER FUNCTIONS ---
        const formatRupiahRealtime = (angkaStr) => {
            let number_string = angkaStr.replace(/[^,\d]/g, '').toString(),
                split = number_string.split('),'),
                sisa = split[0].length % 3,
                rupiah = split[0].substr(0, sisa),
                ribuan = split[0].substr(sisa).match(/\d{3}/gi);
            if (ribuan) {
                let separator = sisa ? '.' : '';
                rupiah += separator + ribuan.join('.');
            }
            return number_string ? 'Rp ' + rupiah : '';
        };

        const parseToNumber = (rupiahStr) => parseInt(rupiahStr.replace(/[^0-9]/g, '')) || 0;
        const formatRupiahMurni = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        const formatTanggalIndo = (tglStr) => new Date(tglStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });

        inputNominal.addEventListener('input', function() { this.value = formatRupiahRealtime(this.value); });
        inputTarget.value = formatRupiahMurni(targetSaatIni);
        inputTarget.addEventListener('input', function() {
            this.value = formatRupiahRealtime(this.value);
            targetSaatIni = parseToNumber(this.value);
            localStorage.setItem('target_nominal_v8', targetSaatIni);
            calculateAndRenderProgress();
        });

        // --- CALCULATE PROGRESS ---
        const calculateAndRenderProgress = () => {
            let totalSaldo = 0;
            dataTabungan.forEach(item => {
                const nominal = parseInt(item.nominal);
                if(item.jenis === 'keluar') totalSaldo -= nominal;
                else totalSaldo += nominal;
            });

            document.getElementById('totalSaldo').innerText = formatRupiahMurni(totalSaldo);

            let persentase = targetSaatIni > 0 && totalSaldo > 0 ? Math.round((totalSaldo / targetSaatIni) * 100) : 0;
            if(totalSaldo < 0) persentase = 0; 

            document.getElementById('txtPersentase').innerText = `${persentase}%`;

            let visualPercent = Math.min(persentase, 100);
            let offset = ringCircumference - (visualPercent / 100) * ringCircumference;
            progressRing.style.strokeDashoffset = offset;

            const txtSisa = document.getElementById('txtSisaKekurangan');
            if (totalSaldo >= targetSaatIni) {
                txtSisa.innerText = "Target tercapai 🎉";
                txtSisa.style.color = "var(--success)";
            } else {
                let sisa = targetSaatIni - totalSaldo;
                txtSisa.innerText = `Kurang ${formatRupiahMurni(sisa)}`;
                txtSisa.style.color = "var(--text-muted)";
            }
        };

        // --- RENDER DAFTAR TABEL ---
        const renderUI = () => {
            const badanTabel = document.getElementById('badanTabel');
            badanTabel.innerHTML = '';

            const sortedData = [...dataTabungan].sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

            sortedData.forEach((item) => {
                const isKeluar = item.jenis === 'keluar';
                const labelJenis = isKeluar ? 'Diambil' : 'Menabung';
                const classNominal = isKeluar ? 'text-keluar' : 'text-masuk';
                const tanda = isKeluar ? '- ' : '+ ';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${formatTanggalIndo(item.tanggal)}</td>
                    <td style="font-weight: 500; color: #2563eb;">${item.bank || '-'}</td>
                    <td>${item.noRek || '-'}</td>
                    <td>${item.namaPemilik || '-'}</td>
                    <td>${labelJenis}</td>
                    <td class="${classNominal}">${tanda}${formatRupiahMurni(item.nominal)}</td>
                    <td style="max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.catatan || '-'}</td>
                    <td style="text-align: center;">
                        <button class="btn-action btn-edit" onclick="openModal(${item.id})">Edit</button>
                        <button class="btn-action btn-delete" onclick="hapusData(${item.id})">Hapus</button>
                    </td>
                `;
                badanTabel.appendChild(tr);
            });

            calculateAndRenderProgress();
        };

        // Simpan Form Utama
        document.getElementById('formTabungan').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const tanggalVal = inputTanggal.value;
            const jenisVal = inputJenis.value;
            const nominalRaw = parseToNumber(inputNominal.value);
            const catatanVal = inputCatatan.value.trim();
            const rekIdSelected = rekeningSelect.value;

            if(!tanggalVal || nominalRaw <= 0 || !rekIdSelected) {
                alert('Pastikan nominal diisi benar dan Rekening Dana sudah dipilih!');
                return;
            }

            const activeAcc = savedAccounts.find(acc => acc.id.toString() === rekIdSelected.toString());
            if(!activeAcc) return;

            const dataBaru = { 
                id: Date.now(), 
                tanggal: tanggalVal, 
                jenis: jenisVal, 
                nominal: nominalRaw,
                bank: activeAcc.bank,
                noRek: activeAcc.noRek,
                namaPemilik: activeAcc.nama,
                catatan: catatanVal || '-'
            };
            dataTabungan.push(dataBaru);

            localStorage.setItem('tabungan_data_v8', JSON.stringify(dataTabungan));
            
            inputNominal.value = '';
            inputCatatan.value = '';
            rekeningSelect.value = '';
            btnHapusRekSaved.style.display = 'none';
            
            renderUI();
        });

        // --- POPUP EDIT SYSTEM ---
        const modalEdit = document.getElementById('editModal');
        const inputEditNominal = document.getElementById('editNominal');
        const inputEditTanggal = document.getElementById('editTanggal');
        const inputEditJenis = document.getElementById('editJenis');
        const inputEditBank = document.getElementById('editBank');
        const inputEditNoRek = document.getElementById('editNoRekField');
        const inputEditNamaPemilik = document.getElementById('editNamaPemilikField');
        const inputEditCatatan = document.getElementById('editCatatan');

        inputEditNominal.addEventListener('input', function() { this.value = formatRupiahRealtime(this.value); });

        const openModal = (id) => {
            const dataItem = dataTabungan.find(item => item.id === id);
            if(dataItem) {
                modeEditId = id;
                inputEditTanggal.value = dataItem.tanggal;
                inputEditJenis.value = dataItem.jenis || 'masuk';
                inputEditNominal.value = formatRupiahRealtime(dataItem.nominal.toString());
                inputEditBank.value = dataItem.bank || '';
                inputEditNoRek.value = dataItem.noRek || '';
                inputEditNamaPemilik.value = dataItem.namaPemilik || '';
                inputEditCatatan.value = dataItem.catatan === '-' ? '' : dataItem.catatan;
                modalEdit.classList.add('active');
            }
        };

        const closeModal = () => {
            modalEdit.classList.remove('active');
            modeEditId = null;
        };

        document.getElementById('formEdit').addEventListener('submit', function(e) {
            e.preventDefault();
            const index = dataTabungan.findIndex(item => item.id === modeEditId);
            if(index !== -1) {
                dataTabungan[index] = { 
                    ...dataTabungan[index], 
                    tanggal: inputEditTanggal.value, 
                    jenis: inputEditJenis.value, 
                    nominal: parseToNumber(inputEditNominal.value),
                    bank: inputEditBank.value.trim(),
                    noRek: inputEditNoRek.value.trim(),
                    namaPemilik: inputEditNamaPemilik.value.trim(),
                    catatan: inputEditCatatan.value.trim() || '-'
                };
                localStorage.setItem('tabungan_data_v8', JSON.stringify(dataTabungan));
                renderUI();
                closeModal();
            }
        });

        const hapusData = (id) => {
            if(confirm('Hapus transaksi ini secara permanen?')) {
                dataTabungan = dataTabungan.filter(item => item.id !== id);
                localStorage.setItem('tabungan_data_v8', JSON.stringify(dataTabungan));
                renderUI();
            }
        };

        // --- EXPORT TO EXCEL SYSTEM ---
        const exportToExcel = () => {
            if(dataTabungan.length === 0) { alert('Data kosong.'); return; }

            const rows = dataTabungan.map((item, index) => {
                const nominal = parseInt(item.nominal);
                return {
                    "No": index + 1,
                    "Tanggal Transaksi": formatTanggalIndo(item.tanggal),
                    "Nama Bank / E-Wallet": item.bank || '-',
                    "Nomor Rekening / HP": item.noRek || '-',
                    "Nama Pemilik Rekening": item.namaPemilik || '-',
                    "Jenis Arus Kas": item.jenis === 'keluar' ? 'Uang Diambil' : 'Uang Masuk',
                    "Nominal Masuk (IDR)": item.jenis !== 'keluar' ? nominal : 0,
                    "Nominal Keluar (IDR)": item.jenis === 'keluar' ? nominal : 0,
                    "Catatan": item.catatan || '-'
                };
            });

            let totalMasuk = 0, totalKeluar = 0;
            dataTabungan.forEach(item => {
                if(item.jenis === 'keluar') totalKeluar += parseInt(item.nominal);
                else totalMasuk += parseInt(item.nominal);
            });

            rows.push({ "No": "", "Tanggal Transaksi": "TOTAL GLOBAL", "Nama Bank / E-Wallet": "", "Nomor Rekening / HP": "", "Nama Pemilik Rekening": "", "Jenis Arus Kas": "", "Nominal Masuk (IDR)": totalMasuk, "Nominal Keluar (IDR)": totalKeluar, "Catatan": "" });
            rows.push({ "No": "", "Tanggal Transaksi": "SALDO BERSIH", "Nama Bank / E-Wallet": "", "Nomor Rekening / HP": "", "Nama Pemilik Rekening": "", "Jenis Arus Kas": "", "Nominal Masuk (IDR)": (totalMasuk - totalKeluar), "Nominal Keluar (IDR)": "", "Catatan": "" });

            const worksheet = XLSX.utils.json_to_sheet(rows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Keuangan");
            worksheet['!cols'] = [{wch: 5}, {wch: 20}, {wch: 22}, {wch: 22}, {wch: 25}, {wch: 18}, {wch: 22}, {wch: 22}, {wch: 30}];
            XLSX.writeFile(workbook, "Laporan_Arus_Kas_Target.xlsx");
        };

        renderSavedAccountsDropdown();
        renderUI();
    </script>
</body>
</html>
